services:
  vote:
    build: ./vote
    ports:
      - "5000:80"
    networks:
      - front-tier
      - back-tier
    depends_on:
      - redis

  result:
    build: ./result
    ports:
      - "5001:80"
    networks:
      - front-tier
      - back-tier
    depends_on:
      - db

  worker:
    build: ./worker
    networks:
      - back-tier
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "postgres"
    networks:
      - back-tier

networks:
  front-tier:
  back-tier:

volumes:
  db-data:
